name: React CI/CD (Local VM)

on:
  push:
    branches: ["main"]

jobs:
  build-deploy:
    runs-on: self-hosted # Your Local VM Runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- Step 1: Securely generate the local .env ---
      - name: Create .env file
        run: |
          touch .env
          echo "VITE_API_URL=${{ secrets.API_URL }}" >> .env
          echo "VITE_ENV=production" >> .env
          echo "VITE_BUILD_TIME=$(date)" >> .env

      # --- Step 2: Build with the local context ---
      - name: Build Docker Image
        run: docker build -t my-react-app:latest .

      # --- Step 3: Local Container Management ---
      - name: Run Container
        run: |
          docker stop react-app || true
          docker rm react-app || true
          docker run -d -p 8090:80 --name react-app my-react-app:latest

      # --- Step 4: Slack Alert (Success or Failure) ---
      - name: Slack Notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_CHANNEL: general
          SLACK_COLOR: ${{ job.status }}
          SLACK_TITLE: Local VM Deployment Status
          SLACK_MESSAGE: |
            *Host:* Local-VM-Server
            *Status:* ${{ job.status }}
            *App URL:* http://your-vm-ip:8090
          SLACK_USERNAME: NixntronicsBot
