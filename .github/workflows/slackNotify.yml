name: Slack Notification Only

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: self-hosted

    steps:
    
      - name: Send Email via Resend
        if: always()
        run: |
          curl -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "onboarding@resend.dev",
              "to": "ajiahamed@live.com",
              "subject": "${{ job.status == 'success' && '✅' || '❌' }} Build ${{ github.run_number }}",
              "html": "<h1>Build ${{ job.status }}</h1><p>Repo: ${{ github.repository }}</p>"
            }'
