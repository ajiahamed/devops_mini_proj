name: Slack Notification Only

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: self-hosted

    steps:
    
      - name: Send Email Notification
        if: always()
        env:
          BREVO_KEY: ${{ secrets.BREVO_API_KEY }}
        run: |
          # 1. Setup variables
          STATUS="${{ job.status }}"
          if [[ "$STATUS" == "success" ]]; then
            COLOR="#28a745"; ICON="✅"
          else
            COLOR="#dc3545"; ICON="❌"
          fi

          # 2. Build the JSON payload into a file to avoid shell escaping issues
          # Note: Ensure the sender email is verified in your Brevo dashboard!
          cat <<EOF > payload.json
          {
            "sender": {"name": "nixNtronics CI", "email": "ajiahamed@gmail.com"},
            "to": [{"email": "ajiahamed@live.com"}],
            "subject": "$ICON $STATUS: ${{ github.repository }}",
            "htmlContent": "<html><body style='font-family:sans-serif;'><div style='background:$COLOR;color:white;padding:20px;text-align:center;border-radius:8px 8px 0 0;'><h1>$ICON Deployment $STATUS</h1></div><div style='padding:20px;border:1px solid #ddd;border-top:none;'><p><b>Repo:</b> ${{ github.repository }}</p><p><b>Branch:</b> ${{ github.ref_name }}</p><p><b>Build:</b> #${{ github.run_number }}</p><p><b>Commit:</b> ${{ github.sha }}</p><div style='margin-top:20px;text-align:center;'><a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}' style='background:#0366d6;color:white;padding:12px 24px;text-decoration:none;border-radius:5px;font-weight:bold;'>🔍 View Build Logs</a></div></div></body></html>"
          }
          EOF

          # 3. Execute curl using the file
          curl --request POST \
            --url https://api.brevo.com/v2/smtp/email \
            --header "accept: application/json" \
            --header "content-type: application/json" \
            --header "api-key: $BREVO_API_KEY" \
            --data @payload.json
      
      - name: Slack Notify
        if: always()
        run: |
          # Set variables based on job status
          if [[ "${{ job.status }}" == "success" ]]; then
            COLOR="#2EB67D"
            ICON="✅"
            STATUS="Success"
          else
            COLOR="#E01E5A"
            ICON="❌"
            STATUS="Failed"
          fi

          # Construct the JSON payload
          curl -X POST -H 'Content-type: application/json' \
          --data '{
            "attachments": [
              {
                "color": "'"$COLOR"'",
                "blocks": [
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "'"$ICON"' *Deployment '"$STATUS"'* | *Build:* #${{ github.run_number }}"
                    }
                  },
                  {
                    "type": "divider"
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "📂 *Repository:* ${{ github.repository }}\n🌿 *Branch:* `${{ github.ref_name }}`\n👤 *Actor:* ${{ github.actor }}\n⚙️ *Event:* `${{ github.event_name }}"
                    }
                  },
                  {
                    "type": "actions",
                    "elements": [
                      {
                        "type": "button",
                        "text": { "type": "plain_text", "text": "🔍 View Logs" },
                        "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                      }
                    ]
                  }
                ]
              }
            ]
          }' ${{ secrets.SLACK_WEBHOOK }}
