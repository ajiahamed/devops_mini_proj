name: Slack Notification Only

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: self-hosted

    steps:
    
      - name: Send Email Notification
        if: always()
        env:
          BREVO_KEY: ${{ secrets.BREVO_API_KEY }}
        run: |
          # 1. Setup variables
          STATUS="${{ job.status }}"
          [ "$STATUS" == "success" ] && COLOR="#28a745" || COLOR="#dc3545"
          [ "$STATUS" == "success" ] && ICON="✅" || ICON="❌"

          # 2. Build HTML without complex nested quotes
          HTML="<html><body style='font-family:sans-serif;'>
            <div style='background:$COLOR;color:white;padding:20px;text-align:center;border-radius:8px 8px 0 0;'>
              <h1>$ICON Deployment $STATUS</h1>
            </div>
            <div style='padding:20px;border:1px solid #ddd;border-top:none;'>
              <p><b>Repo:</b> ${{ github.repository }}</p>
              <p><b>Branch:</b> ${{ github.ref_name }}</p>
              <p><b>Build:</b> #${{ github.run_number }}</p>
              <p><b>Commit:</b> ${{ github.sha }}</p>
              <a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}' 
                 style='display:inline-block;padding:10px 20px;background:#0366d6;color:white;text-decoration:none;border-radius:5px;'>View Logs</a>
            </div>
          </body></html>"

          # 3. Use a Python script (pre-installed on GH Runners) to send. 
          # This handles JSON encoding and headers perfectly.
          python3 - <<EOF
          import requests
          import json
          import os

          api_key = os.getenv('BREVO_KEY')
          url = "https://api.brevo.com/v3/smtp/email"
          
          payload = {
              "sender": {"name": "nixNtronics CI", "email": "ajiahamed@gmail.com"},
              "to": [{"email": "ajiahamed@live.com"}],
              "subject": "$ICON $STATUS: ${{ github.repository }}",
              "htmlContent": """$HTML"""
          }
          
          headers = {
              "accept": "application/json",
              "content-type": "application/json",
              "api-key": api_key
          }

          response = requests.post(url, headers=headers, data=json.dumps(payload))
          print(response.text)
          if response.status_code != 201:
              exit(1)
          EOF
      
      - name: Slack Notify
        if: always()
        run: |
          # Set variables based on job status
          if [[ "${{ job.status }}" == "success" ]]; then
            COLOR="#2EB67D"
            ICON="✅"
            STATUS="Success"
          else
            COLOR="#E01E5A"
            ICON="❌"
            STATUS="Failed"
          fi

          # Construct the JSON payload
          curl -X POST -H 'Content-type: application/json' \
          --data '{
            "attachments": [
              {
                "color": "'"$COLOR"'",
                "blocks": [
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "'"$ICON"' *Deployment '"$STATUS"'* | *Build:* #${{ github.run_number }}"
                    }
                  },
                  {
                    "type": "divider"
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "📂 *Repository:* ${{ github.repository }}\n🌿 *Branch:* `${{ github.ref_name }}`\n👤 *Actor:* ${{ github.actor }}\n⚙️ *Event:* `${{ github.event_name }}"
                    }
                  },
                  {
                    "type": "actions",
                    "elements": [
                      {
                        "type": "button",
                        "text": { "type": "plain_text", "text": "🔍 View Logs" },
                        "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                      }
                    ]
                  }
                ]
              }
            ]
          }' ${{ secrets.SLACK_WEBHOOK }}
