name: Slack Notification Only

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: self-hosted

    steps:

      - name: Slack Notify
        if: always()
        run: |
          # Determine Color and Status Icon based on job status
          if [[ "${{ job.status }}" == "success" ]]; then
            COLOR="#2EB67D"
            STATUS_TEXT="✅ *Deployment Successful*"
          else
            COLOR="#E01E5A"
            STATUS_TEXT="❌ *Deployment Failed*"
          fi

          curl -X POST -H 'Content-type: application/json' \
          --data '{
            "attachments": [
              {
                "color": "'"$COLOR"'",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": "Build Pipeline Notification",
                      "emoji": true
                    }
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "'"$STATUS_TEXT"'"
                    }
                  },
                  {
                    "type": "divider"
                  },
                  {
                    "type": "section",
                    "fields": [
                      { "type": "mrkdwn", "text": "📂 *Repo:*\n${{ github.repository }}" },
                      { "type": "mrkdwn", "text": "🌿 *Branch:*\n`${{ github.ref_name }}`" }
                    ]
                  },
                  {
                    "type": "section",
                    "fields": [
                      { "type": "mrkdwn", "text": "👤 *Actor:*\n${{ github.actor }}" },
                      { "type": "mrkdwn", "text": "🔢 *Build:*\n#${{ github.run_number }}" }
                    ]
                  },
                  {
                    "type": "section",
                    "fields": [
                      { "type": "mrkdwn", "text": "⚙️ *Event:*\n`${{ github.event_name }}`" },
                      { "type": "mrkdwn", "text": "📌 *Commit:*\n`${{ github.sha }}`" }
                    ]
                  },
                  {
                    "type": "divider"
                  },
                  {
                    "type": "actions",
                    "elements": [
                      {
                        "type": "button",
                        "text": { "type": "plain_text", "text": "🔍 View Logs" },
                        "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                      },
                      {
                        "type": "button",
                        "text": { "type": "plain_text", "text": "📦 Github Repo" },
                        "url": "${{ github.server_url }}/${{ github.repository }}"
                      }
                    ]
                  }
                ]
              }
            ]
          }' ${{ secrets.SLACK_WEBHOOK }}
