name: Slack Notification Only

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: self-hosted

    steps:
    
      - name: Send Email Notification
        if: always()
        env:
          # IMPORTANT: Use the "v3 API Key" from the "API Keys" tab in Brevo
          # NOT the SMTP password.
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: |
          STATUS="${{ job.status }}"
          [[ "$STATUS" == "success" ]] && COLOR="#28a745" || COLOR="#dc3545"
          [[ "$STATUS" == "success" ]] && ICON="✅" || ICON="❌"

          # Use the Transactional Email Endpoint (v3/smtp/email)
          # Note: sender email MUST be verified in Brevo
          curl --request POST \
            --url https://api.brevo.com/v3/smtp/email \
            --header "accept: application/json" \
            --header "content-type: application/json" \
            --header "api-key: $BREVO_API_KEY" \
            --data "{
              \"sender\": {\"name\": \"nixNtronics CI\", \"email\": \"ajiahamed@gmail.com\"},
              \"to\": [{\"email\": \"ajiahamed@live.com\"}],
              \"subject\": \"$ICON Deployment $STATUS: ${{ github.repository }}\",
              \"htmlContent\": \"<html><body style='font-family:sans-serif;'><div style='background:$COLOR;color:white;padding:20px;text-align:center;'><h1>$ICON $STATUS</h1></div><p><b>Repo:</b> ${{ github.repository }}<br><b>Branch:</b> ${{ github.ref_name }}<br><b>Build:</b> #${{ github.run_number }}</p><a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}' style='background:#0366d6;color:white;padding:10px 20px;text-decoration:none;border-radius:5px;'>View Logs</a></body></html>\"
            }"
