name: Slack Notification Only

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: self-hosted

    steps:
    
      - name: Send Email Notification
        if: always()
        env:
          BREVO_KEY: ${{ secrets.BREVO_API_KEY }}
        run: |
          # 1. Define Visuals
          if [[ "${{ job.status }}" == "success" ]]; then
            BG_COLOR="#28a745"
            STATUS_ICON="✅"
            STATUS_MSG="Pipeline Success"
          else
            BG_COLOR="#dc3545"
            STATUS_ICON="❌"
            STATUS_MSG="Pipeline Failed"
          fi

          # 2. Build the HTML (Escaping double quotes for JSON safety)
          HTML_BODY="<div style='font-family: sans-serif; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; max-width: 600px;'><div style='background-color: $BG_COLOR; color: white; padding: 20px; text-align: center;'><h1 style='margin: 0;'>$STATUS_ICON $STATUS_MSG</h1><p style='margin: 5px 0 0;'>Build #${{ github.run_number }}</p></div><div style='padding: 20px; background: #ffffff;'><table style='width: 100%; border-collapse: collapse;'><tr style='border-bottom: 1px solid #eee;'><td style='padding: 10px; font-weight: bold;'>📂 Repository</td><td style='padding: 10px;'>${{ github.repository }}</td></tr><tr style='border-bottom: 1px solid #eee;'><td style='padding: 10px; font-weight: bold;'>🌿 Branch</td><td style='padding: 10px;'><code>${{ github.ref_name }}</code></td></tr><tr style='border-bottom: 1px solid #eee;'><td style='padding: 10px; font-weight: bold;'>👤 Actor</td><td style='padding: 10px;'>${{ github.actor }}</td></tr><tr style='border-bottom: 1px solid #eee;'><td style='padding: 10px; font-weight: bold;'>📌 Commit</td><td style='padding: 10px;'><small><code>${{ github.sha }}</code></small></td></tr></table><div style='margin-top: 20px; text-align: center;'><a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}' style='background-color: #0366d6; color: white; padding: 12px 24px; text-decoration: none; border-radius: 5px; font-weight: bold;'>🔍 View Build Logs</a></div></div></div>"

          # 3. Create a clean JSON file to avoid curl quote nesting issues
          cat <<EOF > payload.json
          {
            "sender": {"name": "nixNtronics CI", "email": "ajiahamed@gmail.com"},
            "to": [{"email": "ajiahamed@live.com"}],
            "subject": "$STATUS_ICON Deployment ${{ job.status }} - ${{ github.repository }}",
            "htmlContent": "$(echo $HTML_BODY | sed 's/"/\\"/g')"
          }
          EOF

          # 4. Send using the exact header Brevo requires
          curl --request POST \
            --url https://api.brevo.com/v3/smtp/email \
            --header "accept: application/json" \
            --header "api-key: $BREVO_KEY" \
            --header "content-type: application/json" \
            --data @payload.json
      
      - name: Slack Notify
        if: always()
        run: |
          # Set variables based on job status
          if [[ "${{ job.status }}" == "success" ]]; then
            COLOR="#2EB67D"
            ICON="✅"
            STATUS="Success"
          else
            COLOR="#E01E5A"
            ICON="❌"
            STATUS="Failed"
          fi

          # Construct the JSON payload
          curl -X POST -H 'Content-type: application/json' \
          --data '{
            "attachments": [
              {
                "color": "'"$COLOR"'",
                "blocks": [
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "'"$ICON"' *Deployment '"$STATUS"'* | *Build:* #${{ github.run_number }}"
                    }
                  },
                  {
                    "type": "divider"
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "📂 *Repository:* ${{ github.repository }}\n🌿 *Branch:* `${{ github.ref_name }}`\n👤 *Actor:* ${{ github.actor }}\n⚙️ *Event:* `${{ github.event_name }}"
                    }
                  },
                  {
                    "type": "actions",
                    "elements": [
                      {
                        "type": "button",
                        "text": { "type": "plain_text", "text": "🔍 View Logs" },
                        "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                      }
                    ]
                  }
                ]
              }
            ]
          }' ${{ secrets.SLACK_WEBHOOK }}
